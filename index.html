<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Interno</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  display: flex;
  height: 100vh;
  background: #0f172a;
  color: white;
}

/* 🔹 SIDEBAR */
.sidebar {
  width: 220px;
  background: #020617;
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.sidebar button {
  background: none;
  border: none;
  color: #94a3b8;
  text-align: left;
  padding: 10px;
  cursor: pointer;
  border-radius: 6px;
  margin-bottom: 5px;
}

.sidebar button:hover {
  background: #1e293b;
  color: white;
}

/* 🔹 CONTEÚDO */
.content {
  flex: 1;
  padding: 30px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  max-width: 500px;
}

input, button.action {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button.action {
  background: #22c55e;
  color: white;
  cursor: pointer;
}

#status {
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- 🔹 MENU LATERAL -->
<div class="sidebar">
  <h2>⚙️ Sistema</h2>

  <button onclick="mostrar('dashboard')">🏠 Dashboard</button>
  <button onclick="mostrar('ipeo')">📊 Processador IPEO</button>
  <button onclick="mostrar('ponto')">⏱️ Processador Ponto</button>
</div>


<!-- 🔹 CONTEÚDO -->
<div class="content">

  <!-- DASHBOARD -->
  <div id="dashboard">
    <h1>Dashboard</h1>
    <p>Bem-vindo ao sistema 👊</p>
  </div>


  <!-- IPEO -->
  <div id="ipeo" style="display:none;">
    <div class="card">
      <h2>📊 Processador IPEO</h2>

      <label>Arquivos MIP</label>
      <input type="file" id="meses" multiple>

      <label>Arquivo IPEO</label>
      <input type="file" id="ipeoFile">

      <button class="action" onclick="enviar()">Processar</button>

      <div id="status"></div>
    </div>
  </div>


  <!-- PONTO -->
  <div id="ponto" style="display:none;">
    <div class="card">
      <h2>⏱️ Processador de Ponto</h2>
      <p>🚧 Em desenvolvimento...</p>
    </div>
  </div>

</div>


<script>
// 🔄 TROCAR TELA
function mostrar(tela) {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("ipeo").style.display = "none";
  document.getElementById("ponto").style.display = "none";

  document.getElementById(tela).style.display = "block";
}


// 🚀 ENVIO IPEO
async function enviar() {

  const meses = document.getElementById("meses").files;
  const ipeo = document.getElementById("ipeoFile").files[0];
  const status = document.getElementById("status");

  if (meses.length === 0 || !ipeo) {
    alert("Envie todos os arquivos");
    return;
  }

  const formData = new FormData();

  for (let i = 0; i < meses.length; i++) {
    formData.append("meses", meses[i]);
  }

  formData.append("ipeo", ipeo);

  try {
    status.innerText = "⏳ Processando...";

    const res = await fetch("https://servi-os-online-production.up.railway.app/processar", {
      method: "POST",
      body: formData
    });

    if (!res.ok) throw new Error("Erro na API");

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "resultado.xlsx";
    a.click();

    status.innerText = "✅ Concluído!";

  } catch (err) {
    status.innerText = "❌ " + err.message;
  }
}
</script>

</body>
</html>
